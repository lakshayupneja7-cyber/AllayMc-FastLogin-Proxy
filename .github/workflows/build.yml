name: Build AllayMc FastLogin Proxy

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build proxy plugin
        run: mvn clean package
        working-directory: allaymc-fastlogin-proxy

      - name: Upload proxy jar
        uses: actions/upload-artifact@v4
        with:
          name: allaymc-fastlogin-proxy-jar
          path: allaymc-fastlogin-proxy/target/*.jar
